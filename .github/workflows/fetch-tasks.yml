name: Fetch Daily Tasks

on:
  # 主要觸發改由外部排程（cron-job.org）打 workflow_dispatch，準時可靠。
  # 下面保留「一行」GitHub 內建 cron 當備援：萬一外部排程沒跑，這裡仍會補一次。
  # scraper.py 有新鮮度防呆（抓到與昨日相同會跳過），所以兩邊都跑也無害。
  schedule:
    - cron: '25 6 * * *'   # UTC 06:25 = 台灣 14:25（下午備援一次）
  workflow_dispatch:        # 外部排程 / 手動觸發用（務必保留）

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit tasks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tasks.json
          git diff --staged --quiet || git commit -m "🌍 Daily tasks $(date -u +'%Y-%m-%d')"
          git push
