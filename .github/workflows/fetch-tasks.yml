name: Fetch Daily Tasks

on:
  schedule:
    # 來源 @earthonlinequest 每天台灣早上 9 點發新任務。
    # GitHub Actions 排程常延遲數小時且不準時，故台灣 9 點後每小時嘗試一次
    # （UTC 01:00–14:00 = 台灣 09:00–22:00；分鐘設 25 以避開整點壅塞、降低延遲）。
    # scraper.py 內建新鮮度防呆：抓到的內容若與昨日相同會自動跳過，
    # 所以多跑幾次完全無害 —— 只要來源一發布，最近一次排程就會抓到真正的今日任務。
    - cron: '25 1-14 * * *'
  workflow_dispatch:        # 允許手動觸發（測試用）

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit tasks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tasks.json
          git diff --staged --quiet || git commit -m "🌍 Daily tasks $(date -u +'%Y-%m-%d')"
          git push
